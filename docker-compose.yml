version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: foodwaste_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: foodwaste
      MYSQL_USER: foodwaste
      MYSQL_PASSWORD: foodwaste_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - foodwaste_network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "foodwaste", "-pfoodwaste_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and background tasks
  redis:
    image: redis:7-alpine
    container_name: foodwaste_redis
    ports:
      - "6379:6379"
    networks:
      - foodwaste_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodwaste_backend
    environment:
      DATABASE_URL: mysql+pymysql://foodwaste:foodwaste_password@mysql:3306/foodwaste
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./models:/app/models
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - foodwaste_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker for background tasks
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodwaste_celery
    environment:
      DATABASE_URL: mysql+pymysql://foodwaste:foodwaste_password@mysql:3306/foodwaste
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - mysql
      - backend
    networks:
      - foodwaste_network
    command: celery -A celery_app worker --loglevel=info

  # Celery Beat for scheduled tasks
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodwaste_celery_beat
    environment:
      DATABASE_URL: mysql+pymysql://foodwaste:foodwaste_password@mysql:3306/foodwaste
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - mysql
      - backend
    networks:
      - foodwaste_network
    command: celery -A celery_app beat --loglevel=info

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foodwaste_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - foodwaste_network
    command: npm run dev -- --host 0.0.0.0 --port 3000

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: foodwaste_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - foodwaste_network
    restart: unless-stopped
    profiles:
      - production

  # phpMyAdmin for database management
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: foodwaste_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: foodwaste
      PMA_PASSWORD: foodwaste_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - foodwaste_network
    profiles:
      - tools

  # Prometheus for monitoring (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: foodwaste_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - foodwaste_network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    profiles:
      - monitoring

  # Grafana for visualization (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: foodwaste_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - foodwaste_network
    profiles:
      - monitoring

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:

networks:
  foodwaste_network:
    driver: bridge

# Usage:
# Development (MySQL + Redis + Backend + Frontend): docker-compose up -d
# With phpMyAdmin: docker-compose --profile tools up -d
# With monitoring: docker-compose --profile monitoring up -d
# With nginx (production): docker-compose --profile production up -d
# Stop all: docker-compose down
# Stop and remove volumes: docker-compose down -v