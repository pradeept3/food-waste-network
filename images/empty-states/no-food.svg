  <line x1="135" y1="120" x2="165" y2="120" stroke="#1976D2" stroke-width="4" stroke-linecap="round"/>
  <!-- Decorative elements -->
  <circle cx="60" cy="240" r="30" fill="#81C784" opacity="0.5"/>
  <circle cx="240" cy="250" r="25" fill="#64B5F6" opacity="0.5"/>
  <path d="M 150 200 Q 140 220 150 240 Q 160 220 150 200" fill="#FF7043" opacity="0.6"/>
  <text x="150" y="280" font-size="18" fill="#1976D2" text-anchor="middle" font-weight="bold">No food items yet</text>
</svg>