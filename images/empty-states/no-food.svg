<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="emptyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#emptyGradient)"/>
  <!-- Box illustration -->
  <rect x="80" y="60" width="140" height="120" fill="#90CAF9" stroke="#1976D2" stroke-width="2"/>
  <path d="M 80 60 L 120 30 L 260 30 L 220 60 Z" fill="#64B5F6" stroke="#1976D2" stroke-width="2"/>
  <path d="M 220 60 L 260 30 L 260 90 L 220 120 Z" fill="#2196F3" stroke="#1976D2" stroke-width="2"/>
  <!-- Inside box glow -->
