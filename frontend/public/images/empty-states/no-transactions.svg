<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="transactionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#transactionGradient)"/>
  <!-- Hand giving food -->
  <path d="M 80 140 L 100 100 L 110 120 L 130 115 L 140 135 L 155 130" stroke="#2E7D32" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="70" cy="155" r="25" fill="#81C784" stroke="#2E7D32" stroke-width="2"/>
  <!-- Food being received -->
  <path d="M 220 140 L 200 100 L 190 120 L 170 115 L 160 135 L 145 130" stroke="#FFC107" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="230" cy="155" r="25" fill="#FFD54F" stroke="#F57C00" stroke-width="2"/>
  <!-- Arrow connecting -->
  <path d="M 140 145 Q 150 120 160 145" stroke="#2E7D32" stroke-width="3" fill="none" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2E7D32" />
    </marker>
  </defs>
  <!-- Decorative elements -->
  <circle cx="100" cy="250" r="22" fill="#4CAF50" opacity="0.5"/>
  <circle cx="200" cy="260" r="20" fill="#FF9800" opacity="0.5"/>
  <text x="150" y="290" font-size="18" fill="#2E7D32" text-anchor="middle" font-weight="bold">Start Donating</text>
</svg>