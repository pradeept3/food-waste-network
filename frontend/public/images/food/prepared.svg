<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="preparedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5722;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D84315;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#preparedGradient)"/>
  <!-- Plate -->
  <circle cx="100" cy="95" r="45" fill="#FFF9C4" stroke="#FBC02D" stroke-width="2"/>
  <!-- Fork -->
  <line x1="65" y1="60" x2="55" y2="130" stroke="#9E9E9E" stroke-width="3" stroke-linecap="round"/>
  <line x1="55" y1="130" x2="45" y2="135" stroke="#9E9E9E" stroke-width="2" stroke-linecap="round"/>
  <line x1="55" y1="130" x2="50" y2="140" stroke="#9E9E9E" stroke-width="2" stroke-linecap="round"/>
  <line x1="55" y1="130" x2="60" y2="140" stroke="#9E9E9E" stroke-width="2" stroke-linecap="round"/>
  <!-- Food on plate -->
  <circle cx="95" cy="85" r="12" fill="#4CAF50"/>
  <circle cx="110" cy="90" r="10" fill="#FF6F00"/>
  <rect x="85" y="105" width="20" height="8" fill="#FFD700" rx="2"/>
  <!-- Knife -->
  <line x1="135" y1="60" x2="145" y2="130" stroke="#9E9E9E" stroke-width="3" stroke-linecap="round"/>
  <path d="M 145 130 L 148 125" stroke="#9E9E9E" stroke-width="2"/>
  <text x="100" y="175" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Prepared Meals</text>
</svg>