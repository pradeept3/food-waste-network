<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="meatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E53935;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C62828;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#meatGradient)"/>
  <!-- Meat cuts -->
  <polygon points="60,80 90,75 95,105 65,110" fill="#A00" stroke="#8B0000" stroke-width="1.5"/>
  <polygon points="110,85 140,80 145,115 115,120" fill="#C41C3B" stroke="#8B0000" stroke-width="1.5"/>
  <!-- Chicken drumstick -->
  <ellipse cx="85" cy="130" rx="12" ry="25" fill="#D32F2F" transform="rotate(-30 85 130)"/>
  <circle cx="75" cy="105" r="8" fill="#B71C1C"/>
  <!-- Marbling detail -->
  <line x1="70" y1="90" x2="75" y2="100" stroke="#FFB74D" stroke-width="1" opacity="0.5"/>
  <line x1="120" y1="95" x2="125" y2="105" stroke="#FFB74D" stroke-width="1" opacity="0.5"/>
  <text x="100" y="175" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Meat & Seafood</text>
</svg>